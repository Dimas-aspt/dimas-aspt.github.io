<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Online - Shopping Cart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .cart-icon {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .cart-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #fff;
            color: #ff6b6b;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(45deg, #f0f0f0, #e0e0e0);
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #999;
        }

        .product-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 1.2rem;
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .add-to-cart {
            width: 100%;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-to-cart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #ff6b6b;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .item-price {
            color: #ff6b6b;
            font-weight: bold;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .qty-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .qty-btn:hover {
            background: #ff5252;
        }

        .remove-item {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
        }

        .total {
            text-align: center;
            margin: 20px 0;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .checkout-btn {
            width: 100%;
            background: linear-gradient(45deg, #4CAF50, #66BB6A);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .checkout-form {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .payment-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .payment-method {
            border: 2px solid #e1e1e1;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .payment-method:hover,
        .payment-method.selected {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        .qris-code {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .qris-image {
            width: 200px;
            height: 200px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 15px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 100px;
            background: #4CAF50;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 3000;
        }

        .notification.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                width: 95%;
                margin: 20px;
            }
            
            .payment-methods {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛍️ Toko Online</h1>
            <p style="color: white; opacity: 0.9;">Belanja mudah dengan pembayaran QRIS</p>
        </div>

        <button class="cart-icon" id="cartIcon">
            🛒
            <span class="cart-count" id="cartCount">0</span>
        </button>

        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <span class="close" id="closeCart">&times;</span>
            <h2>🛒 Keranjang Belanja</h2>
            <div id="cartItems"></div>
            <div class="total" id="cartTotal">Total: Rp 0</div>
            <button class="checkout-btn" id="checkoutBtn">Checkout</button>
            
            <div class="checkout-form" id="checkoutForm">
                <h3>📋 Informasi Pengiriman</h3>
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="customerName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="customerEmail" required>
                </div>
                <div class="form-group">
                    <label>Nomor Telepon</label>
                    <input type="tel" id="customerPhone" required>
                </div>
                <div class="form-group">
                    <label>Alamat Lengkap</label>
                    <textarea id="customerAddress" rows="3" required></textarea>
                </div>
                
                <h3>💳 Metode Pembayaran</h3>
                <div class="payment-methods">
                    <div class="payment-method" data-method="qris">
                        <div style="font-size: 24px; margin-bottom: 10px;">📱</div>
                        <div>QRIS</div>
                    </div>
                    <div class="payment-method" data-method="cod">
                        <div style="font-size: 24px; margin-bottom: 10px;">💸</div>
                        <div>COD</div>
                    </div>
                </div>
                
                <div class="qris-code" id="qrisCode">
                    <h4>Scan QR Code untuk Pembayaran</h4>
                    <div class="qris-image">
                        QR Code akan muncul disini<br>
                        setelah memproses pesanan
                    </div>
                    <p>Total: <span id="qrisTotal">Rp 0</span></p>
                </div>
                
                <button class="checkout-btn" id="processOrderBtn">Proses Pesanan</button>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        // Sample products data
        const products = [
            { id: 1, name: "Laptop Gaming", price: 15000000, image: "💻" },
            { id: 2, name: "Smartphone", price: 8000000, image: "📱" },
            { id: 3, name: "Headphone", price: 1500000, image: "🎧" },
            { id: 4, name: "Keyboard Mechanical", price: 2000000, image: "⌨️" },
            { id: 5, name: "Mouse Gaming", price: 800000, image: "🖱️" },
            { id: 6, name: "Monitor 4K", price: 6000000, image: "🖥️" }
        ];

        let cart = [];
        let selectedPaymentMethod = '';

        // Initialize the app
        function init() {
            loadProducts();
            updateCartIcon();
            setupEventListeners();
        }

        // Load products to the page
        function loadProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">${product.image}</div>
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">Rp ${product.price.toLocaleString('id-ID')}</div>
                    <button class="add-to-cart" onclick="addToCart(${product.id})">
                        Tambah ke Keranjang
                    </button>
                </div>
            `).join('');
        }

        // Add product to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCartIcon();
            showNotification('Produk ditambahkan ke keranjang!');
        }

        // Update cart icon
        function updateCartIcon() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = totalItems;
        }

        // Show notification
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Display cart items
        function displayCartItems() {
            const cartItemsContainer = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p style="text-align: center; color: #999;">Keranjang kosong</p>';
                document.getElementById('cartTotal').textContent = 'Total: Rp 0';
                return;
            }

            cartItemsContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">Rp ${item.price.toLocaleString('id-ID')}</div>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            <button class="remove-item" onclick="removeFromCart(${item.id})">Hapus</button>
                        </div>
                    </div>
                </div>
            `).join('');

            updateCartTotal();
        }

        // Update item quantity
        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    displayCartItems();
                    updateCartIcon();
                }
            }
        }

        // Remove item from cart
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            displayCartItems();
            updateCartIcon();
        }

        // Update cart total
        function updateCartTotal() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartTotal').textContent = `Total: Rp ${total.toLocaleString('id-ID')}`;
            document.getElementById('qrisTotal').textContent = `Rp ${total.toLocaleString('id-ID')}`;
        }

        // Setup event listeners
        function setupEventListeners() {
            // Cart icon click
            document.getElementById('cartIcon').addEventListener('click', () => {
                document.getElementById('cartModal').style.display = 'block';
                displayCartItems();
            });

            // Close cart modal
            document.getElementById('closeCart').addEventListener('click', () => {
                document.getElementById('cartModal').style.display = 'none';
                document.getElementById('checkoutForm').style.display = 'none';
                document.getElementById('qrisCode').style.display = 'none';
            });

            // Checkout button
            document.getElementById('checkoutBtn').addEventListener('click', () => {
                if (cart.length === 0) {
                    showNotification('Keranjang masih kosong!');
                    return;
                }
                document.getElementById('checkoutForm').style.display = 'block';
            });

            // Payment method selection
            document.querySelectorAll('.payment-method').forEach(method => {
                method.addEventListener('click', () => {
                    document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('selected'));
                    method.classList.add('selected');
                    selectedPaymentMethod = method.dataset.method;
                    
                    if (selectedPaymentMethod === 'qris') {
                        document.getElementById('qrisCode').style.display = 'block';
                    } else {
                        document.getElementById('qrisCode').style.display = 'none';
                    }
                });
            });

            // Process order button
            document.getElementById('processOrderBtn').addEventListener('click', processOrder);

            // Close modal when clicking outside
            window.addEventListener('click', (e) => {
                if (e.target === document.getElementById('cartModal')) {
                    document.getElementById('cartModal').style.display = 'none';
                    document.getElementById('checkoutForm').style.display = 'none';
                    document.getElementById('qrisCode').style.display = 'none';
                }
            });
        }

        // Process order
        function processOrder() {
            const name = document.getElementById('customerName').value;
            const email = document.getElementById('customerEmail').value;
            const phone = document.getElementById('customerPhone').value;
            const address = document.getElementById('customerAddress').value;

            if (!name || !email || !phone || !address || !selectedPaymentMethod) {
                showNotification('Mohon lengkapi semua data!');
                return;
            }

            const orderData = {
                customer: { name, email, phone, address },
                items: cart,
                paymentMethod: selectedPaymentMethod,
                total: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0)
            };

            // Simulate API call
            showNotification('Memproses pesanan...');
            
            setTimeout(() => {
                if (selectedPaymentMethod === 'qris') {
                    // Generate mock QR code
                    const qrisImage = document.querySelector('.qris-image');
                    qrisImage.innerHTML = `
                        <div style="font-size: 12px; line-height: 1.4;">
                            🟦🟦⬜🟦🟦<br>
                            🟦⬜⬜⬜🟦<br>
                            ⬜⬜🟦⬜⬜<br>
                            🟦⬜⬜⬜🟦<br>
                            🟦🟦⬜🟦🟦<br>
                            <small>Mock QR Code</small>
                        </div>
                    `;
                    showNotification('QR Code berhasil dibuat! Silakan scan untuk pembayaran.');
                } else {
                    showNotification('Pesanan berhasil! Pembayaran akan dilakukan saat barang tiba.');
                    
                    // Clear cart after successful order
                    setTimeout(() => {
                        cart = [];
                        updateCartIcon();
                        document.getElementById('cartModal').style.display = 'none';
                        document.getElementById('checkoutForm').style.display = 'none';
                        document.getElementById('qrisCode').style.display = 'none';
                    }, 2000);
                }
            }, 1500);
        }

        // Initialize the app when page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
